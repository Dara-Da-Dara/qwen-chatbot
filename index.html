<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qwen3 Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #f4f5f8;
      --surface: #ffffff;
      --ink: #1a1b2e;
      --muted: #8a8da0;
      --line: #e6e7ee;
      --accent: #5b54e0;
      --accent-2: #7d63f0;
      --user-ink: #ffffff;
      --assistant-bg: #ffffff;
      --radius: 16px;
      --shadow: 0 1px 2px rgba(26, 27, 46, 0.06), 0 8px 24px rgba(26, 27, 46, 0.06);
      --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: var(--font);
      color: var(--ink);
      background:
        radial-gradient(1200px 600px at 50% -20%, #eceafd 0%, transparent 60%),
        var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 760px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(8px);
    }

    .brand { display: flex; align-items: baseline; gap: 8px; }

    .mark {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 500;
      letter-spacing: -0.5px;
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .brand-sub { font-size: 13px; color: var(--muted); }

    .status {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--muted);
    }

    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .dot.online { background: #22c55e; box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15); }
    .dot.offline { background: #ef4444; }

    .thread {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .welcome { margin: auto; text-align: center; padding: 40px 0; }
    .welcome h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; }
    .welcome p { margin-top: 8px; color: var(--muted); font-size: 15px; }

    .msg {
      max-width: 82%;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-wrap: break-word;
      animation: rise 0.28s ease both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      align-self: flex-end;
      color: var(--user-ink);
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      border-bottom-right-radius: 4px;
    }

    .msg.assistant {
      align-self: flex-start;
      background: var(--assistant-bg);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-bottom-left-radius: 4px;
    }

    .msg.error {
      align-self: flex-start;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      font-size: 14px;
    }

    .typing { display: flex; gap: 5px; padding: 4px 2px; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    .composer {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 14px 20px 20px;
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(8px);
    }

    textarea {
      flex: 1;
      resize: none;
      max-height: 160px;
      padding: 12px 16px;
      font-family: var(--font);
      font-size: 15px;
      color: var(--ink);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91, 84, 224, 0.12);
    }

    #send {
      flex-shrink: 0;
      width: 46px; height: 46px;
      display: grid;
      place-items: center;
      border: none;
      border-radius: 14px;
      color: #fff;
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      cursor: pointer;
      transition: transform 0.12s, opacity 0.2s;
    }
    #send:hover:not(:disabled) { transform: translateY(-1px); }
    #send:active:not(:disabled) { transform: translateY(0); }
    #send:disabled { opacity: 0.45; cursor: not-allowed; }

    @media (max-width: 640px) { .msg { max-width: 88%; } }

    @media (prefers-reduced-motion: reduce) {
      *, .msg, .typing span { animation: none !important; transition: none !important; }
      .thread { scroll-behavior: auto; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="mark">Qwen3</span>
        <span class="brand-sub">chat</span>
      </div>
      <div class="status" id="status">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">connecting…</span>
      </div>
    </header>

    <main class="thread" id="thread" aria-live="polite">
      <div class="welcome" id="welcome">
        <h1>Ask Qwen anything</h1>
        <p>A minimal chatbot running on an open-weights Qwen model.</p>
      </div>
    </main>

    <form class="composer" id="composer" autocomplete="off">
      <textarea id="input" rows="1" placeholder="Send a message…" aria-label="Message"></textarea>
      <button type="submit" id="send" aria-label="Send message">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none">
          <path d="M4 12l16-8-6 8 6 8-16-8z" fill="currentColor" />
        </svg>
      </button>
    </form>
  </div>

  <script>
    // Frontend is served by FastAPI, so same-origin "" works.
    // If you ever host this HTML separately, set API_BASE to your backend URL.
    const API_BASE = "";

    const thread = document.getElementById("thread");
    const welcome = document.getElementById("welcome");
    const form = document.getElementById("composer");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");

    const history = [
      { role: "system", content: "You are a helpful, concise assistant." },
    ];
    let busy = false;

    (async function checkHealth() {
      try {
        const res = await fetch(`${API_BASE}/api/health`);
        const data = await res.json();
        statusDot.classList.add("online");
        statusText.textContent = data.model || "ready";
      } catch {
        statusDot.classList.add("offline");
        statusText.textContent = "backend offline";
      }
    })();

    function addMessage(role, text) {
      welcome?.remove();
      const el = document.createElement("div");
      el.className = `msg ${role}`;
      el.textContent = text;
      thread.appendChild(el);
      thread.scrollTop = thread.scrollHeight;
      return el;
    }

    function showTyping() {
      welcome?.remove();
      const el = document.createElement("div");
      el.className = "msg assistant";
      el.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
      thread.appendChild(el);
      thread.scrollTop = thread.scrollHeight;
      return el;
    }

    function autoGrow() {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 160) + "px";
    }
    input.addEventListener("input", autoGrow);

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text || busy) return;

      busy = true;
      sendBtn.disabled = true;
      input.value = "";
      autoGrow();

      addMessage("user", text);
      history.push({ role: "user", content: text });

      const typingEl = showTyping();

      try {
        const res = await fetch(`${API_BASE}/api/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: history, max_tokens: 512, temperature: 0.7 }),
        });
        if (!res.ok) throw new Error(`server responded ${res.status}`);
        const data = await res.json();
        typingEl.remove();
        addMessage("assistant", data.reply);
        history.push({ role: "assistant", content: data.reply });
      } catch (err) {
        typingEl.remove();
        const el = addMessage("error", `Couldn't reach the model. ${err.message}`);
        el.className = "msg error";
      } finally {
        busy = false;
        sendBtn.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
