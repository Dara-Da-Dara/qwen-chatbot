<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qwen3 Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="mark">Qwen3</span>
        <span class="brand-sub">chat</span>
      </div>
      <div class="status" id="status">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">connecting…</span>
      </div>
    </header>

    <main class="thread" id="thread" aria-live="polite">
      <div class="welcome" id="welcome">
        <h1>Ask Qwen anything</h1>
        <p>A minimal chatbot running on an open-weights Qwen model.</p>
      </div>
    </main>

    <form class="composer" id="composer" autocomplete="off">
      <textarea
        id="input"
        rows="1"
        placeholder="Send a message…"
        aria-label="Message"
      ></textarea>
      <button type="submit" id="send" aria-label="Send message">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none">
          <path d="M4 12l16-8-6 8 6 8-16-8z" fill="currentColor" />
        </svg>
      </button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
